<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Balbo Bedachungen</title>
  <link rel="icon" type="image/png" href="favicon2.png">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      color: #333;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      text-align: center;
      background-color: #2e3b4e;
      color: white;
      padding: 1.5rem;
    }

    .logo {
      height: 60px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    .header-text h1 {
      margin: 0;
      font-size: 2rem;
    }

    .header-text p {
      margin: 0.25rem 0 0;
    }

    nav {
      background: #44566c;
      padding: 0.75rem;
      text-align: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0.25rem 0.75rem;
      font-weight: bold;
      display: inline-block;
    }

    section {
      padding: 2rem 1rem;
      max-width: 900px;
      margin: auto;
    }

    .hero {
      text-align: center;
    }

    .hero-logo {
      width: 220px;
      max-width: 80%;
      height: auto;
      display: block;
      margin: 0 auto 1.5rem;
    }

    .hero h2 {
      margin-top: 0;
      font-size: 1.8rem;
    }

    .bild {
      width: 100%;
      max-width: 900px;
      height: auto;
      display: block;
      margin: 1.5rem auto 0;
      border-radius: 8px;
    }

    footer {
      background-color: #2e3b4e;
      color: white;
      text-align: center;
      padding: 1rem;
      margin-top: 2rem;
    }

    footer a {
      color: #ccc;
    }

    @media (max-width: 600px) {
      header {
        padding: 1rem;
      }

      .header-text h1 {
        font-size: 1.5rem;
      }

      section {
        padding: 1.25rem 1rem;
      }

      nav a {
        margin: 0.4rem 0.6rem;
      }

      .hero h2 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <a href="index.html">
      <img src="logo_weiss.png" alt="Balbo Bedachungen Logo" class="logo">
    </a>
    <div class="header-text">
      <h1>Balbo Bedachungen</h1>
      <p>Wir steigen Ihnen aufs Dach</p>
    </div>
  </header>

  <nav>
    <a href="leistungen.html">Leistungen</a>
    <a href="ueber.html">Über uns</a>
    <a href="galerie.html">Galerie</a>
    <a href="contact.html">Kontakt</a>
  </nav>

  <section class="hero" id="baustelle">
    <img src="logo.png" alt="Balbo Bedachungen Logo" class="hero-logo">

    <h2>Unsere Webseite entsteht – wie Ihr neues Dach: Stück für Stück mit Qualität.</h2>

    <img src="Ref005.jpeg" alt="Baustellenbild von Balbo Bedachungen" class="bild" loading="lazy">
  </section>

  <footer>
    <p>
      &copy; 2025 Balbo Bedachungen ·
      <a href="impressum.html">Impressum</a> ·
      <a href="datenschutz.html">Datenschutz</a>
    </p>
    <p>
      <a href="https://www.instagram.com/balbo_bedachungen" target="_blank" rel="noopener"
         style="color: white; text-decoration: none; font-size: 1.5rem;">
        &#x1F4F7; Folge uns auf Instagram
      </a>
    </p>
  </footer>

</body>
</html>
