<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Galerie – Balbo Bedachungen</title>
  <link rel="icon" type="image/png" href="favicon2.png">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      color: #333;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      text-align: center;
      background-color: #2e3b4e;
      color: white;
      padding: 1.5rem;
    }

    .logo {
      height: 60px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    .header-text h1 {
      margin: 0;
      font-size: 2rem;
    }

    .header-text p {
      margin: 0.25rem 0 0;
    }

    nav {
      background: #44566c;
      padding: 0.75rem;
      text-align: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0.25rem 0.75rem;
      font-weight: bold;
      display: inline-block;
    }

    section {
      padding: 2rem 1rem;
      max-width: 1000px;
      margin: auto;
    }

    h2 {
      margin-top: 0;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }

    .gallery-grid a {
      display: block;
      text-decoration: none;
    }

    .gallery-grid img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: zoom-in;
    }

    .gallery-grid img:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
    }

    .video-wrapper {
      margin-top: 2rem;
      display: flex;
      justify-content: center;
    }

    .video-wrapper video {
      width: 100%;
      max-width: 900px;
      height: auto;
      display: block;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      background: black;
    }

    footer {
      background-color: #2e3b4e;
      color: white;
      text-align: center;
      padding: 1rem;
      margin-top: 2rem;
    }

    footer a {
      color: #ccc;
    }

    .instagram-link {
      color: white;
      text-decoration: none;
      font-size: 1.5rem;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 1000;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox-content {
      position: relative;
      max-width: 95vw;
      max-height: 95vh;
    }

    .lightbox-content img {
      max-width: 100%;
      max-height: 95vh;
      display: block;
      border-radius: 10px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
      background: white;
    }

    .lightbox-close {
      position: absolute;
      top: -14px;
      right: -14px;
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: white;
      color: #222;
      font-size: 1.2rem;
      cursor: pointer;
      line-height: 36px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    @media (max-width: 600px) {
      header {
        padding: 1rem;
      }

      .header-text h1 {
        font-size: 1.5rem;
      }

      section {
        padding: 1.25rem 1rem;
      }

      nav a {
        margin: 0.4rem 0.6rem;
      }

      .gallery-grid {
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 0.75rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html">
      <img src="logo_weiss.png" alt="Balbo Bedachungen Logo" class="logo">
    </a>

    <div class="header-text">
      <h1>Balbo Bedachungen</h1>
      <p>Wir steigen Ihnen aufs Dach</p>
    </div>
  </header>

  <nav>
    <a href="index.html">Startseite</a>
    <a href="leistungen.html">Leistungen</a>
    <a href="ueber.html">Über uns</a>
    <a href="contact.html">Kontakt</a>
  </nav>

  <section id="galerie">
    <h2>Galerie</h2>

    <div class="gallery-grid">
      <a href="Ref001.jpg" class="gallery-item">
        <img src="Ref001.jpg" alt="Projektfoto 1">
      </a>
      <a href="Ref002.jpg" class="gallery-item">
        <img src="Ref002.jpg" alt="Projektfoto 2">
      </a>
      <a href="Ref003.jpg" class="gallery-item">
        <img src="Ref003.jpg" alt="Projektfoto 3">
      </a>
      <a href="Ref004.jpg" class="gallery-item">
        <img src="Ref004.jpg" alt="Projektfoto 4">
      </a>
      <a href="Ref006.jpg" class="gallery-item">
        <img src="Ref006.jpg" alt="Projektfoto 6">
      </a>
      <a href="Visitenkarte.jpg" class="gallery-item">
        <img src="Visitenkarte.jpg" alt="Visitenkarte Balbo Bedachungen">
      </a>
    </div>
  </section>

  <section id="videos">
    <h2>Video</h2>

    <div class="video-wrapper">
      <video controls playsinline>
        <source src="VideoDach01.mp4" type="video/mp4">
        Ihr Browser kann dieses Video nicht wiedergeben.
      </video>
    </div>
  </section>

  <footer>
    <p>
      &copy; 2025 Balbo Bedachungen ·
      <a href="impressum.html">Impressum</a> ·
      <a href="datenschutz.html">Datenschutz</a>
    </p>
    <p>
      <a href="https://www.instagram.com/balbo_bedachungen" target="_blank" rel="noopener" class="instagram-link">
        &#x1F4F7; Folge uns auf Instagram
      </a>
    </p>
  </footer>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lightbox-content">
      <button class="lightbox-close" id="lightboxClose" aria-label="Bild schließen">×</button>
      <img src="" alt="" id="lightboxImage">
    </div>
  </div>

  <script>
    const lightbox = document.getElementById('lightbox');
    const lightboxImage = document.getElementById('lightboxImage');
    const lightboxClose = document.getElementById('lightboxClose');
    const galleryItems = document.querySelectorAll('.gallery-item');

    galleryItems.forEach(item => {
      item.addEventListener('click', function (e) {
        e.preventDefault();
        const img = this.querySelector('img');
        lightboxImage.src = this.href;
        lightboxImage.alt = img.alt || 'Vergrößertes Bild';
        lightbox.classList.add('active');
        lightbox.setAttribute('aria-hidden', 'false');
      });
    });

    function closeLightbox() {
      lightbox.classList.remove('active');
      lightbox.setAttribute('aria-hidden', 'true');
      lightboxImage.src = '';
      lightboxImage.alt = '';
    }

    lightboxClose.addEventListener('click', closeLightbox);

    lightbox.addEventListener('click', function (e) {
      if (e.target === lightbox) {
        closeLightbox();
      }
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && lightbox.classList.contains('active')) {
        closeLightbox();
      }
    });
  </script>

</body>
</html>
