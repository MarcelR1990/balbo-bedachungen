<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blaue Webseite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            min-height: 100vh;
        }
        
        header {
            background-color: #0d47a1;
            padding: 20px;
            text-align: center;
        }
        
        header h1 {
            font-size: 2.5em;
        }
        
        main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
        }
        
        section {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 30px;
            margin: 20px 0;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        
        section h2 {
            margin-bottom: 15px;
            font-size: 1.8em;
        }
        
        section p {
            line-height: 1.6;
        }
        
        footer {
            background-color: #0d47a1;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Willkommen</h1>
    </header>
    
    <main>
        <section>
            <h2>Über diese Seite</h2>
            <p>Dies ist eine schöne blaue Webseite mit modernem Design und ansprechenden Farben.</p>
        </section>
        
        <section>
            <h2>Inhalte</h2>
            <p>Hier können Sie interessante Informationen finden und mehr über unsere Services erfahren.</p>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2024 - Alle Rechte vorbehalten</p>
    </footer>
</body>
</html>
